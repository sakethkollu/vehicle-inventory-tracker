# Production overlay for ZimaOS / homelab deploy (Caddy on host network).
# - Web published on host 127.0.0.1:5052 only (Caddy reverse_proxy 127.0.0.1:5052)
# - mysql/redis stay on the internal Docker network (not exposed to host)
#
# Usage:
#   cp .env.example .env   # set secrets (see below)
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Caddyfile:
#   vehicles.sakethkollu.me {
#       reverse_proxy 127.0.0.1:5052
#   }

services:
  redis:
    ports: !reset []

  mysql:
    ports: !reset []

  web:
    ports: !reset ["127.0.0.1:5052:5050"]
    environment:
      # Always use Docker service names (not 127.0.0.1) unless web also uses network_mode: host
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: redis://redis:6379/0
      MAZDA_DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MAZDA_DATABASE:-mazda_inventory}
