# Production overlay for ZimaOS / homelab deploy (Caddy on host network).
# - Web published on host :5052 (Caddy: reverse_proxy zimaos:5052)
# - mysql/redis stay on the internal Docker network (not exposed to host)
#
# Usage:
#   cp .env.example .env   # set secrets (see below)
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Caddyfile:
#   vehicle-inventory.sakethkollu.me {
#       reverse_proxy zimaos:5052
#   }

services:
  redis:
    ports: !reset []

  mysql:
    ports: !reset []

