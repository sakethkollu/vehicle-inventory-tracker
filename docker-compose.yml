name: vehicle-inventory

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MAZDA_DATABASE: ${MAZDA_DATABASE:-mazda_inventory}
    ports:
      - "3306:3306"
    volumes:
      # Named volume avoids InnoDB redo-log corruption on Docker Desktop for Mac
      # (bind-mounting ./mysql_data to the host can trigger error 1504).
      - mysql_data:/var/lib/mysql
      - ./vehicle_inventory/db/schema_mysql.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./docker/mysql-init/02-mazda-db.sh:/docker-entrypoint-initdb.d/02-mazda-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    stop_grace_period: 30s

  web:
    build: .
    restart: unless-stopped
    ports:
      - "5052:5050"
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      USE_REDIS_JOBS: ${USE_REDIS_JOBS:-1}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-me-in-production}
      LOG_JSON: ${LOG_JSON:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TOYOTA_WAF_TOKEN: ${TOYOTA_WAF_TOKEN:-}
      MAZDA_DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MAZDA_DATABASE:-mazda_inventory}
      MAZDA_SESSION_COOKIE: ${MAZDA_SESSION_COOKIE:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    restart: unless-stopped
    command: ["python", "run_worker.py"]
    environment:
      DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      USE_REDIS_JOBS: ${USE_REDIS_JOBS:-1}
      LOG_JSON: ${LOG_JSON:-1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      TOYOTA_WAF_TOKEN: ${TOYOTA_WAF_TOKEN:-}
      MAZDA_DATABASE_URL: mysql+pymysql://${MYSQL_USER}:${MYSQL_PASSWORD}@mysql:3306/${MAZDA_DATABASE:-mazda_inventory}
      MAZDA_SESSION_COOKIE: ${MAZDA_SESSION_COOKIE:-}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  adminer:
    profiles: [dev]
    image: adminer:4
    restart: unless-stopped
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      mysql:
        condition: service_healthy

  redis-commander:
    profiles: [dev]
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_started

volumes:
  mysql_data:
